<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch Luxury</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0f0f0f;
        color: white;
      }

      /* NAV */
      .navbar {
        background: black;
        border-bottom: 1px solid gold;
      }
      .navbar h4 {
        color: gold;
      }

      /* HERO */
      .hero {
        height: 350px;
        background: url("photos/bg.jpg") center/cover;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .hero::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
      }
      .hero h1 {
        position: relative;
        color: gold;
      }

      /* CARD */
      .card {
        background: #1a1a1a;
        border: none;
        border-radius: 12px;
      }
      .card img {
        height: 180px;
        object-fit: cover;
      }
      .card h6,
      .card p {
        color: white;
      }

      /* BUTTON */
      .btn-gold {
        background: gold;
        color: black;
        border: none;
      }

      /* CART */
      .cart-box {
        position: fixed;
        right: -350px;
        top: 0;
        width: 320px;
        height: 100%;
        background: #111;
        padding: 20px;
        transition: 0.3s;
        z-index: 999;
      }
      .cart-box.active {
        right: 0;
      }

      .cart-item {
        background: #1a1a1a;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 10px;
      }

      /* OVERLAY */
      #overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        z-index: 998;
      }
      #overlay.active {
        display: block;
      }

      /* CHECKOUT */
      .checkout {
        display: none;
        padding: 40px;
      }

      /* MODAL */
      .modal-content {
        background: #111;
        color: white;
      }
    </style>
  </head>

  <body>
    <!-- NAV -->
    <nav class="navbar">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
          <img src="photos/logo.jpg" width="35" />
          <h4>Watch Luxury</h4>
        </div>

        <div class="d-flex align-items-center gap-2">
          <span id="user-name"></span>
          <button class="btn btn-outline-warning btn-sm" onclick="openLogin()">
            Login
          </button>
          <button class="btn btn-warning btn-sm" onclick="openRegister()">
            Register
          </button>
          <button class="btn btn-danger btn-sm" onclick="logout()">
            Logout
          </button>
          <div onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <h1>Luxury Watch Collection</h1>
    </section>

    <!-- PRODUCTS -->
    <div class="container mt-5">
      <div class="row" id="product-list"></div>
    </div>

    <!-- OVERLAY -->
    <div id="overlay"></div>

    <!-- CART -->
    <div class="cart-box" id="cart-box">
      <h5>Cart</h5>
      <div id="cart-items"></div>
      <button class="btn btn-gold w-100" onclick="goCheckout()">
        Checkout
      </button>
    </div>

    <!-- CHECKOUT -->
    <div class="container checkout" id="checkout">
      <h3>Checkout</h3>
      <div class="row">
        <div class="col-md-6">
          <input class="form-control mb-2" placeholder="Name" />
          <input class="form-control mb-2" placeholder="Phone" />
        </div>
        <div class="col-md-6">
          <div id="order-summary"></div>
          <button class="btn btn-gold w-100" onclick="placeOrder()">
            Place Order
          </button>
        </div>
      </div>
    </div>

    <!-- DETAIL -->
    <div class="modal fade" id="detailModal">
      <div class="modal-dialog">
        <div class="modal-content p-3">
          <h5 id="detail-name"></h5>
          <img id="detail-img" class="w-100 mb-2" />
          <p id="detail-price"></p>
          <button class="btn btn-gold" onclick="addDetail()">
            Add to Cart
          </button>
        </div>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="modal fade" id="registerModal">
      <div class="modal-dialog">
        <div class="modal-content p-3">
          <h5>Register</h5>
          <input id="reg-name" class="form-control mb-2" placeholder="Name" />
          <input id="reg-email" class="form-control mb-2" placeholder="Email" />
          <input
            id="reg-pass"
            type="password"
            class="form-control mb-2"
            placeholder="Password"
          />
          <button class="btn btn-warning w-100" onclick="register()">
            Register
          </button>
        </div>
      </div>
    </div>

    <!-- LOGIN -->
    <div class="modal fade" id="loginModal">
      <div class="modal-dialog">
        <div class="modal-content p-3">
          <h5>Login</h5>
          <input
            id="login-email"
            class="form-control mb-2"
            placeholder="Email"
          />
          <input
            id="login-pass"
            type="password"
            class="form-control mb-2"
            placeholder="Password"
          />
          <button class="btn btn-gold w-100" onclick="login()">Login</button>
        </div>
      </div>
    </div>

    <script>
      let selectedProduct = null;

      let products = [
        {
          id: 1,
          name: "Rolex Classic",
          price: 120,
          img: "photos/Rolex-Classic.jpg",
        },
        {
          id: 2,
          name: "Gold Watch",
          price: 150,
          img: "photos/Gold-Watch.jpg",
        },
        {
          id: 3,
          name: "Luxury Silver",
          price: 110,
          img: "photos/Luxury-Silver.jpg",
        },
        {
          id: 4,
          name: "Black Watch",
          price: 90,
          img: "photos/Black-Watch.jpg",
        },
        {
          id: 5,
          name: "Minimal Watch",
          price: 80,
          img: "photos/Minimal-Watch.jpg",
        },
        {
          id: 6,
          name: "Sport Watch",
          price: 70,
          img: "photos/Sport-Watch.jpg",
        },
        {
          id: 7,
          name: "Smart Watch",
          price: 130,
          img: "photos/Smart-Watch.jpg",
        },
        {
          id: 8,
          name: "Vintage Watch",
          price: 140,
          img: "photos/Vintage-Watch.jpg",
        },
        {
          id: 9,
          name: "Luxury Gold Pro",
          price: 200,
          img: "photos/Luxury-Gold-Pro.jpg",
        },
        {
          id: 10,
          name: "Diamond Watch",
          price: 250,
          img: "photos/Diamond-Watch.jpg",
        },
        {
          id: 11,
          name: "Classic Leather",
          price: 95,
          img: "photos/Classic-Leather.jpg",
        },
        {
          id: 12,
          name: "Modern Steel",
          price: 105,
          img: "photos/Modern-Steel.jpg",
        },
      ];

      let cart = JSON.parse(localStorage.getItem("cart")) || [];

      /* PRODUCTS */
      function renderProducts() {
        let html = "";
        products.forEach((p) => {
          html += `
<div class="col-6 col-md-3 mb-4">
<div class="card p-2">
<img src="${p.img}">
<div class="text-center mt-2">
<h6>${p.name}</h6>
<p>$${p.price}</p>
<button class="btn btn-gold" onclick="addToCart(${p.id})">Add</button>
<button class="btn btn-outline-light btn-sm" onclick="viewDetail(${p.id})">View</button>
</div>
</div>
</div>`;
        });
        document.getElementById("product-list").innerHTML = html;
      }

      /* CART */
      function addToCart(id) {
        let p = products.find((x) => x.id === id);
        let item = cart.find((x) => x.id === id);
        if (item) {
          item.qty++;
        } else {
          cart.push({ ...p, qty: 1 });
        }
        saveCart();
        renderCart();
      }

      function renderCart() {
        let html = "",
          count = 0,
          total = 0;

        if (cart.length === 0) {
          html = "<p>No items</p>";
        } else {
          cart.forEach((p) => {
            count += p.qty;
            total += p.price * p.qty;

            html += `
<div class="cart-item d-flex justify-content-between align-items-center">

<div class="d-flex align-items-center gap-2">
<img src="${p.img}" style="width:50px;height:50px;object-fit:cover;border-radius:8px;">
<div>
<b>${p.name}</b><br>
<small>$${p.price} x ${p.qty}</small>
</div>
</div>

<div>
<button onclick="changeQty(${p.id},-1)">➖</button>
<button onclick="changeQty(${p.id},1)">➕</button>
<button onclick="removeItem(${p.id})">❌</button>
</div>

</div>`;
          });

          html += `<hr><b>Total: $${total.toFixed(2)}</b>`;
        }

        document.getElementById("cart-items").innerHTML = html;
        document.getElementById("cart-count").innerText = count;

        renderSummary();
      }

      function changeQty(id, n) {
        let item = cart.find((p) => p.id === id);
        item.qty += n;
        if (item.qty <= 0) {
          cart = cart.filter((p) => p.id !== id);
        }
        saveCart();
        renderCart();
      }

      function removeItem(id) {
        cart = cart.filter((p) => p.id !== id);
        saveCart();
        renderCart();
      }

      function saveCart() {
        localStorage.setItem("cart", JSON.stringify(cart));
      }

      /* CART UI */
      function toggleCart() {
        document.getElementById("cart-box").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
      }

      document.addEventListener("click", function (e) {
        let c = document.getElementById("cart-box");
        if (
          !c.contains(e.target) &&
          !e.target.closest('[onclick="toggleCart()"]')
        ) {
          c.classList.remove("active");
          document.getElementById("overlay").classList.remove("active");
        }
      });

      /* CHECKOUT */
      function goCheckout() {
        document.getElementById("checkout").style.display = "block";
      }

      function renderSummary() {
        let html = "",
          total = 0;
        cart.forEach((p) => {
          let sub = p.price * p.qty;
          total += sub;
          html += `<div>${p.name} x ${p.qty} = $${sub}</div>`;
        });
        html += `<hr>Total $${total}`;
        document.getElementById("order-summary").innerHTML = html;
      }

      function placeOrder() {
        alert("Order success");
        cart = [];
        saveCart();
        renderCart();
      }

      /* DETAIL */
      function viewDetail(id) {
        let p = products.find((x) => x.id === id);
        selectedProduct = p;
        document.getElementById("detail-name").innerText = p.name;
        document.getElementById("detail-img").src = p.img;
        document.getElementById("detail-price").innerText = "$" + p.price;
        new bootstrap.Modal(document.getElementById("detailModal")).show();
      }

      function addDetail() {
        addToCart(selectedProduct.id);
      }

      /* AUTH */
      function openRegister() {
        new bootstrap.Modal(document.getElementById("registerModal")).show();
      }
      function openLogin() {
        new bootstrap.Modal(document.getElementById("loginModal")).show();
      }

      function register() {
        let user = {
          name: reg - name.value,
          email: reg - email.value,
          pass: reg - pass.value,
        };
        localStorage.setItem("user", JSON.stringify(user));
        alert("Registered");
      }

      function login() {
        let u = JSON.parse(localStorage.getItem("user"));
        if (
          u &&
          u.email == login - email.value &&
          u.pass == login - pass.value
        ) {
          localStorage.setItem("login", true);
          showUser();
          alert("Login success");
        } else alert("Wrong");
      }

      function showUser() {
        let u = JSON.parse(localStorage.getItem("user"));
        if (localStorage.getItem("login") && u) {
          document.getElementById("user-name").innerText = "👤 " + u.name;
        }
      }

      function logout() {
        localStorage.removeItem("login");
        document.getElementById("user-name").innerText = "";
      }

      /* INIT */
      renderProducts();
      renderCart();
      showUser();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
